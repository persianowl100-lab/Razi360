<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فروشگاه | رازی ۳۶۰</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: linear-gradient(145deg, #1a140c 0%, #241e14 40%, #2b2113 100%);
      color: #f7efe2;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .glass-card {
      background: rgba(30, 24, 16, 0.7);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 180, 60, 0.2);
      box-shadow: 0 25px 45px -10px rgba(180, 100, 20, 0.2);
      border-radius: 30px;
      padding: 50px 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(to left, #ffd166, #f4a261, #e9a554);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      color: #cdb088;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.4s ease;
      font-size: 1.1rem;
      font-family: 'Vazirmatn', sans-serif;
      background: linear-gradient(135deg, #f4a261, #e67e22);
      color: #1a140c;
      box-shadow: 0 8px 20px rgba(230, 126, 34, 0.5);
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(255, 160, 20, 0.7);
      background: linear-gradient(135deg, #f5b06e, #f08c2e);
    }

    .construction-icon {
      font-size: 5rem;
      color: #ffb347;
      margin-bottom: 20px;
      animation: float 3s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <i class="fas fa-shopping-cart construction-icon"></i>
    <h1>🛒 فروشگاه رازی ۳۶۰</h1>
    <p>محصولات و خدمات هوش مصنوعی و رایانه‌ای به زودی در این بخش قرار خواهند گرفت.</p>
    <p style="font-size: 0.9rem; color: #a6906c;">منتظر محصولات شگفت‌انگیز ما باشید...</p>
    <a href="../index.html" class="btn">
      <i class="fas fa-arrow-right"></i>
      بازگشت به صفحه اصلی
    </a>
  </div>
</body>
</html>
